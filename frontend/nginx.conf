server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback — every unknown path serves index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API, health, and docs to the FastAPI backend ───────────────────
    # Set API_HOST and API_PORT env vars to configure the upstream.
    # Default: localhost:8000.  Use envsubst when starting nginx:
    #   envsubst '$API_HOST $API_PORT' < nginx.conf.template > /etc/nginx/conf.d/default.conf
    location ~ ^/(api|health|docs|redoc|openapi\.json) {
        set $upstream   http://${API_HOST:-localhost}:${API_PORT:-8000};
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Support long-running build jobs (up to 30 min)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }
}
