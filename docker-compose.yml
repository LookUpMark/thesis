# Multi-Agent Framework — Docker Compose
# Usage: docker compose up          (API + Neo4j)
#        docker compose up --build   (rebuild after code changes)
#
# Swagger UI: http://localhost:8000/docs
# Neo4j Browser: http://localhost:7474

services:
  # ── Neo4j Graph Database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26
    container_name: thesis-neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-thesis_password}"
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ── GraphRAG API Server ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thesis-api
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # API authentication — set API_KEY to enable; leave empty to disable (dev mode)
      API_KEY: "${API_KEY:-}"
      # Neo4j connection — Docker bridge network (service name resolves)
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-thesis_password}"
      # LLM configuration — set these in .env or override at runtime
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LLM_MODEL_REASONING: "${LLM_MODEL_REASONING:-gpt-5.4-2026-03-05}"
      LLM_MODEL_EXTRACTION: "${LLM_MODEL_EXTRACTION:-gpt-5.4-nano-2026-03-17}"
      LLM_MODEL_MIDTIER: "${LLM_MODEL_MIDTIER:-gpt-5.4-mini-2026-03-17}"
      LLM_MAX_TOKENS_REASONING: "${LLM_MAX_TOKENS_REASONING:-4096}"
      LLM_MAX_TOKENS_EXTRACTION: "${LLM_MAX_TOKENS_EXTRACTION:-8192}"
      # Embedding + reranker — local FlagEmbedding models (baked into image)
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-m3}"
      RERANKER_MODEL: "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
      HF_HOME: "/app/.cache/huggingface"
      HF_HUB_OFFLINE: "1"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/hf_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
